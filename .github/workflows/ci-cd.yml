name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, json, tokenizer
        coverage: none
        tools: composer:v2
        
    - name: Get Composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
      
    - name: Cache Composer dependencies
      uses: actions/cache@v6
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-
        
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-suggest
      
    - name: Run PHPCS
      run: bash scripts/check-phpcs-baseline.sh
        
  test:
    name: PHP ${{ matrix.php-versions }} Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    strategy:
      matrix:
        php-versions: ['8.3']
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}
        extensions: mbstring, xml, ctype, json, tokenizer, mysqli
        coverage: xdebug
        tools: composer:v2
        
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
      
    - name: Check PHP syntax
      run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

    - name: Check JavaScript syntax and authentication navigation behavior
      run: |
        node --check assets/js/product-query.js
        node --check assets/js/panel-app.js
        node --check assets/js/currency-postboxes.js
        node --check assets/js/branding/admin-branding.js
        node --test tests/product-query.test.js
        node --test tests/admin-branding-auth-nav.test.js

    - name: Run PHPUnit tests
      run: composer test
      
  security:
    name: Security Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:v2
        
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
      
    - name: Check for known security vulnerabilities
      run: composer audit --locked
      
  build:
    name: Build Plugin Package
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    permissions:
      contents: read
    env:
      COMPOSER_ROOT_VERSION: dev-main
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        # Tests above use GitHub's synthetic merge commit. Package the exact
        # reviewed head so its commit epoch and checksum are reproducible.
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:2.10.2, wp-cli:2.12.0
      env:
        fail-fast: true
        
    - name: Install production dependencies
      run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader --no-interaction

    - name: Audit production dependencies
      run: composer audit --locked --no-dev
      
    - name: Build translation files
      run: |
        # Build .mo files from .po files (i18n command is included in WP-CLI 2.5+)
        if [ -n "$(find languages/ -name '*.po' -type f 2>/dev/null)" ]; then
          wp i18n make-mo languages/ --allow-root
          echo "Translation files built successfully"
          ls -la languages/
        else
          echo "No .po files found to build"
        fi
      
    - name: Reject public backup artifacts
      run: bash scripts/check-public-tree.sh

    - name: Build and verify deterministic plugin archive
      run: |
        SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
        export SOURCE_DATE_EPOCH
        bash scripts/build-plugin-package.sh build/digitalogic-wp.zip
        (
          cd build
          sha256sum digitalogic-wp.zip | tee digitalogic-wp.zip.sha256
        )
        
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: digitalogic-wp-plugin
        path: |
          build/digitalogic-wp.zip
          build/digitalogic-wp.zip.sha256
        if-no-files-found: error
        compression-level: 0
        retention-days: 30
