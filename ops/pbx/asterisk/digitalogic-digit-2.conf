; Merge deliberately into the live /etc/asterisk/extensions.conf after taking a
; dated backup and verifying its checksum. Do not include this file blindly.
; Both live s and _X entries in [from-tci] must snapshot ANI BEFORE
; prefix-tci-callerid prepends its routing digit 9. The menu Gosub must run BEFORE
; both the prefix and Gosub(record-call).
;
; Insert these three lines in BOTH [from-tci] s and _X entry paths, before their
; existing prefix/record/operator lines. The context itself is the DID trust boundary,
; so use the trusted literal DID rather than possibly blank DNID or ${EXTEN}=s:
;   same => n,Set(__PBX_VERIFY_ANI=${FILTER(0-9+,${CALLERID(num)})})
;   same => n,Set(__PBX_VERIFY_DID=+982166754123)
;   same => n,Gosub(digitalogic-call-verification-menu,s,1)
;   ; Existing prefix-tci-callerid / Gosub(record-call) / Dial(operator) remain
;   ; below this point in their current order.
;
; Never assign PBX_VERIFY_ANI again after prefix-tci-callerid changes CALLERID(num).
; Option 2 does not Return to recording/operator routing; timeout, 0, and invalid do.

[digitalogic-call-verification-menu]
exten => s,1,Background(custom/call-verification/digitalogic/current/menu-option-2)
 same => n,WaitExten(5)
 same => n,Return()

exten => 2,1,Gosub(pbx-call-verification-digitalogic,s,1)
 same => n,Hangup()

exten => 0,1,Return()
exten => t,1,Return()
exten => i,1,Return()

[pbx-call-verification-digitalogic]
exten => s,1,StopMixMonitor()
 same => n,AGI(/usr/local/libexec/pbx-verification-digitalogic)
 same => n,Return()

; Security invariants:
; - This context must not be included from from-internal or exposed as a feature code.
; - The helper reads the filtered PBX_VERIFY_ANI and PBX_VERIFY_DID channel variables.
; - The helper itself collects six digits with AGI GET DATA; code is never placed in a
;   dialplan variable, command argument, NoOp(), Verbose(), System(), or recording.
; - Keep `agi set debug off`, DTMF debug/logging off, and recording after menu fallback.
;   StopMixMonitor is a final guard if an upstream route was changed unexpectedly.
