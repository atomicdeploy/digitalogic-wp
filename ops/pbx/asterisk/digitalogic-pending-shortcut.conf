; Reviewed merge fragment for /etc/asterisk/extensions.conf. Take a dated backup,
; verify its checksum, and merge deliberately; never #include this file blindly.
;
; CURRENT PRODUCTION ROUTING: Digitalogic has no public IVR yet. Both [from-tci]
; s and _X paths must go directly through prefix-tci-callerid, record-call, and
; Dial(PJSIP/${OPERATOR_EXT},30,Tt), where OPERATOR_EXT=101. Do not invoke either
; helper context below from the public DID until a separate IVR design is approved.
;
; The contexts remain installed as dormant, reviewed building blocks so the next
; IVR pass can enable verification deliberately without recovering old code. They
; MUST NOT be merged into the current [from-tci] priorities.
;
; In the existing [prefix-tci-callerid] context, normalize the two TCI variants
; immediately before adding the internal callback access prefix:
;
;   same => n,ExecIf($["${CALLERID(num):0:5}"="00989"]?Set(CALLERID(num)=09${CALLERID(num):5}))
;   same => n,ExecIf($["${CALLERID(num):0:4}"="0989"]?Set(CALLERID(num)=09${CALLERID(num):4}))
;   same => n,ExecIf($["${CALLERID(num):0:3}"="021"]?Set(CALLERID(num)=${CALLERID(num):3}))
;   same => n,ExecIf($["${CALLERID(num)}"!=""]?Set(CALLERID(num)=9${CALLERID(num)}))
;
; This maps 0989XXXXXXXXX and 00989XXXXXXXXX to the same canonical
; 09XXXXXXXXX number. A same-city Tehran landline loses its 021 trunk prefix
; before the existing callback access prefix is added; other caller IDs pass
; through unchanged.

[pbx-call-verification-pending-digitalogic]
exten => preflight,1,AGI(/usr/local/libexec/pbx-verification-digitalogic,preflight)
 same => n,Return()
exten => shortcut,1,Answer()
 same => n,StopMixMonitor()
 same => n,Set(PBX_VERIFY_PENDING=0)
 same => n,Set(PBX_VERIFY_RESULT=fallback)
 same => n,AGI(/usr/local/libexec/pbx-verification-digitalogic,shortcut)
 same => n,Return()

; Retain a private, unrouted verification context as a reviewed building block for
; a future real IVR. It MUST NOT be included from from-internal or assigned a public
; digit until a separate Digitalogic menu is approved.
[pbx-call-verification-digitalogic]
exten => s,1,StopMixMonitor()
 same => n,AGI(/usr/local/libexec/pbx-verification-digitalogic,verify)
 same => n,Return()

; Privacy invariants:
; - No current public path performs ANI lookup or verification collection.
; - A future IVR must snapshot ANI before prefix-tci-callerid mutates CALLERID(num).
; - STREAM FILE / WAIT FOR DIGIT remain inside AGI; no code enters a channel
;   variable, argument, NoOp, Verbose, System, CDR, or recording.
; - Keep AGI/DTMF debug disabled. Current inbound recording starts before Dial(101).
